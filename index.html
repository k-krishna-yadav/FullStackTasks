<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2: Student Records Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Student Records Dashboard</h1>
        <p class="subtitle">Task 2: Data Retrieval & Sorting | Running on localhost:3000</p>

        <div class="controls">
            <div class="control-group">
                <label>Sort by:</label>
                <select id="sortBy">
                    <option value="name">Name</option>
                    <option value="date">Registration Date</option>
                </select>
                
                <select id="sortOrder">
                    <option value="asc">Ascending ↑</option>
                    <option value="desc">Descending ↓</option>
                </select>
            </div>

            <div class="control-group">
                <label>Filter by Department:</label>
                <select id="departmentFilter">
                    <option value="all">All Departments</option>
                </select>
            </div>

            <button onclick="loadStudents()" class="refresh-btn">🔄 Refresh Data</button>
        </div>

        <div class="stats-container" id="stats">
            <div class="stat-card loading-stats">Loading statistics...</div>
        </div>

        <table id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Registration Date</th>
                </tr>
            </thead>
            <tbody id="studentBody">
                <tr>
                    <td colspan="4" class="loading">Loading data from server...</td>
                </tr>
            </tbody>
        </table>
        
        <div class="server-status">
            <span class="status-dot"></span> Connected to localhost:3000
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
